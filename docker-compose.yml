services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mongapi-backend
    container_name: mongapi-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    env_file:
      - ./.env
    environment:
      DB_HOST: db
    networks:
      - mongapi-network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: mongapi-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - mongapi-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    image: mongapi-backend
    container_name: mongapi-reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    ports:
      - "8006:8080"
    volumes:
      - ./:/var/www
    env_file:
      - ./.env
    environment:
      DB_HOST: db
    networks:
      - mongapi-network
    depends_on:
      - app
      - db

  db:
    image: postgres:16-alpine
    container_name: mongapi-db
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - mongapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: mongapi-pgadmin
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - mongapi-network
    depends_on:
      - db

networks:
  mongapi-network:
    driver: bridge
    name: mongapi_network

volumes:
  dbdata:
  pgadmin-data:
